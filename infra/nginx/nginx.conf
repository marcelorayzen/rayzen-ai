# Rayzen AI — NGINX reverse proxy
# Replace YOUR_DOMAIN with the actual domain (e.g., rayzen.marcelorayzen.dev)
# SSL certs are managed by Certbot at /etc/letsencrypt/live/YOUR_DOMAIN/

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    # Frontend — Next.js
    location / {
        proxy_pass         http://web:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API — NestJS (all routes under /api/)
    location /api/ {
        rewrite            ^/api(/.*)$ $1 break;
        proxy_pass         http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SSE — disable buffering for /chat streaming
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;
    }

    # Certbot webroot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}
