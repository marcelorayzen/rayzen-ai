version: '3.9'

# Production override — extends docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    ports: []  # not exposed publicly

  redis:
    ports: []  # not exposed publicly

  litellm:
    ports: []  # not exposed publicly
    restart: always

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    ports: []  # exposed via nginx only
    env_file: .env.production
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    ports: []  # exposed via nginx only
    env_file: .env.production
    environment:
      NODE_ENV: production
    depends_on:
      - api

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Run manually: docker compose run certbot certonly --webroot -w /var/www/certbot -d YOUR_DOMAIN
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  pg_data:
  redis_data:
  certbot_www:
  certbot_conf:
