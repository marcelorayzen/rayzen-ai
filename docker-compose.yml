version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: rayzen
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha}
      POSTGRES_DB: rayzen_ai
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rayzen']
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://rayzen:senha@postgres:5432/rayzen_ai
    volumes:
      - ./infra/litellm/config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_started

volumes:
  pg_data:
  redis_data:
